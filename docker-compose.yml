services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: notesapp
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: superdev
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d planner']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
